<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postaw na milion — Ekran Gracza</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b1220;
    color: #f1f1f1;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .wrap { max-width: 600px; width: 100%; text-align: center; }
  h1 { color: #d4af37; font-size: 1.4em; margin-bottom: 30px; }
  .waiting { font-size: 1.2em; color: #999; }
  .prompt { font-size: 1.2em; margin-bottom: 20px; }
  .category-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .category-buttons button {
    background: #142238; border: 2px solid #d4af37; color: #f1f1f1;
    padding: 24px 10px; font-size: 1.1em; font-weight: bold;
    border-radius: 12px; cursor: pointer;
  }
  .category-buttons button:active { background: #1c3050; }

  .qs-fullscreen {
    position: fixed;
    inset: 0;
    background: #0b1220;
    display: flex;
    flex-direction: column;
  }
  .qs-header {
    padding: 24px 30px;
    text-align: center;
    font-size: 2em;
    font-weight: bold;
    color: #d4af37;
    border-bottom: 2px solid #2a3550;
    line-height: 1.3;
  }
  .qs-body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .qs-media {
    width: 32%;
    border-right: 2px solid #2a3550;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .qs-media img, .qs-media video {
    max-width: 100%;
    max-height: 100%;
    border-radius: 10px;
    object-fit: contain;
  }
  .qs-answers {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }
  .qs-cell {
    border: 1px solid #2a3550;
    display: flex;
    align-items: center;
    padding: 30px 36px;
    font-size: 1.8em;
    text-align: left;
    line-height: 1.35;
  }
  .qs-cell .letter {
    font-weight: bold;
    color: #d4af37;
    margin-right: 16px;
    font-size: 1.1em;
    flex-shrink: 0;
  }
  @media (orientation: portrait) {
    .qs-header { font-size: 1.4em; padding: 16px; }
    .qs-body { flex-direction: column; }
    .qs-media { width: 100%; height: 35%; border-right: none; border-bottom: 2px solid #2a3550; }
    .qs-cell { font-size: 1.2em; padding: 18px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Postaw na milion</h1>
  <div id="content"><div class="waiting">Czekam na rozpoczecie rundy...</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="dane.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCI_URtq3UQA5oEvqMaHrAnG9YID5zTTSw",
  authDomain: "postaw-na-milion-30154.firebaseapp.com",
  databaseURL: "https://postaw-na-milion-30154-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "postaw-na-milion-30154",
  storageBucket: "postaw-na-milion-30154.firebasestorage.app",
  messagingSenderId: "892861421426",
  appId: "1:892861421426:web:16e947880cbfad71f92feb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const content = document.getElementById('content');

const MEDIA_CANDIDATES = [
  { ext: 'jpg', type: 'image' },
  { ext: 'jpeg', type: 'image' },
  { ext: 'png', type: 'image' },
  { ext: 'webp', type: 'image' },
  { ext: 'gif', type: 'image' },
  { ext: 'mp4', type: 'video' },
  { ext: 'webm', type: 'video' }
];
const mediaCache = {};

function resolveMedia(baseName) {
  if (mediaCache[baseName]) return Promise.resolve(mediaCache[baseName]);
  let i = 0;
  function tryNext() {
    if (i >= MEDIA_CANDIDATES.length) return Promise.resolve(null);
    const c = MEDIA_CANDIDATES[i];
    i++;
    const url = 'media/' + baseName + '.' + c.ext;
    return fetch(url, { method: 'HEAD' }).then(res => {
      if (res.ok) {
        const result = { url: url, type: c.type };
        mediaCache[baseName] = result;
        return result;
      }
      return tryNext();
    }).catch(function() { return tryNext(); });
  }
  return tryNext();
}

function getDifficulty(round) {
  if (round <= 5) return 'latwe';
  if (round <= 10) return 'srednie';
  if (round <= 15) return 'trudne';
  if (round <= 20) return 'bardzo_trudne';
  return null;
}

function chooseCategory(idx) {
  db.ref('game/chosenIndex').set(idx);
}

db.ref('game').on('value', function(snap) {
  const state = snap.val();
  render(state);
});

function render(state) {
  if (!state || state.status === 'idle') {
    content.innerHTML = '<div class="waiting">Czekam na rozpoczecie rundy...</div>';
    return;
  }
  if (state.status === 'finished') {
    content.innerHTML = '<div class="waiting">Koniec gry!</div>';
    return;
  }

  const difficulty = getDifficulty(state.round);
  const diffArr = gameData[difficulty];

  if (state.status === 'categories') {
    if (state.chosenIndex === null || state.chosenIndex === undefined) {
      let buttonsHtml = '';
      state.offered.forEach(function(idx) {
        buttonsHtml += '<button onclick="chooseCategory(' + idx + ')">' + diffArr[idx].kategoria + '</button>';
      });
      content.innerHTML = '<div class="prompt">Wybierz kategorie:</div><div class="category-buttons">' + buttonsHtml + '</div>';
    } else {
      content.innerHTML = '<div class="waiting">Wybrano: ' + diffArr[state.chosenIndex].kategoria + '<br>Czekam na pytanie...</div>';
    }
    return;
  }

  if (state.status === 'question') {
    const q = diffArr[state.chosenIndex];
    const litery = ['A', 'B', 'C', 'D'];

    let answersHtml = '';
    q.odpowiedzi.forEach(function(a, i) {
      answersHtml += '<div class="qs-cell"><span class="letter">' + litery[i] + '.</span> ' + a + '</div>';
    });

    let mediaSlotHtml = '';
    if (q.media) {
      mediaSlotHtml = '<div class="qs-media" id="qsMediaSlot"></div>';
    }

    content.innerHTML = '<div class="qs-fullscreen"><div class="qs-header">' + q.pytanie + '</div><div class="qs-body">' + mediaSlotHtml + '<div class="qs-answers">' + answersHtml + '</div></div></div>';

    if (q.media) {
      const slot = document.getElementById('qsMediaSlot');
      resolveMedia(q.media).then(function(result) {
        if (!result || !slot.isConnected) return;
        if (result.type === 'video') {
          slot.innerHTML = '<video src="' + result.url + '" autoplay loop playsinline ontouchend="this.controls=true" onclick="this.controls=true"></video>';
        } else {
          slot.innerHTML = '<img src="' + result.url + '">';
        }
      });
    }
  }
}
</script>
</body>
</html>
