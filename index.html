<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postaw na milion — Panel Prowadzącego</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b1220;
    color: #f1f1f1;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { text-align: center; color: #d4af37; font-size: 1.5em; margin-bottom: 10px; }
  .info-bar {
    display: flex; justify-content: center; gap: 20px;
    margin-bottom: 25px; font-size: 1em; color: #ccc;
  } 
  .info-bar span { background: #142238; padding: 6px 14px; border-radius: 20px; }
  #idleScreen, #categoriesScreen, #questionScreen, #finishedScreen {
    max-width: 500px; margin: 0 auto; text-align: center;
  }
  button {
    background: #142238; border: 2px solid #d4af37; color: #f1f1f1;
    padding: 16px 20px; font-size: 1em; border-radius: 10px; cursor: pointer;
    margin-top: 10px; width: 100%;
  }
  button:hover { background: #1c3050; }
  .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .category-chip {
    background: #1c3050; border: 2px solid #d4af37; border-radius: 10px;
    padding: 18px 10px; font-weight: bold;
  }
  #waitingForPlayer { color: #999; margin: 15px 0; }
  .question-box { background: #142238; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
  .category-tag {
    display: inline-block; background: #d4af37; color: #0b1220;
    font-weight: bold; padding: 6px 16px; border-radius: 20px; margin-bottom: 15px;
  }
  .question-text { font-size: 1.2em; margin-bottom: 15px; }
  .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .answer-chip { background: #1c3050; border: 2px solid #444; border-radius: 8px; padding: 14px 8px; text-align: left; }
  .answer-chip .letter { font-weight: bold; color: #d4af37; margin-right: 6px; }
  .answer-chip.correct { background: #2e7d32; border-color: #2e7d32; }
  .end-game-btn {
    max-width: 500px; margin: 30px auto 0; display: block;
    background: transparent; border-color: #c0392b; color: #e57373;
  }
  .status { text-align: center; color: #4caf50; font-size: 0.85em; margin-top: 20px; }
</style>
</head>
<body>

<h1>Panel Prowadzacego</h1>
<div class="info-bar">
  <span id="roundLabel">Runda 1 / 20</span>
  <span id="difficultyLabel">Latwe</span>
</div>

<div id="idleScreen">
  <button onclick="startRound()">Rozpocznij runde</button>
</div>

<div id="categoriesScreen" style="display:none">
  <p>Wylosowane kategorie:</p>
  <div class="categories" id="offeredCategories"></div>
  <p id="waitingForPlayer">Czekam na wybor gracza...</p>
  <button id="showQuestionBtn" style="display:none" onclick="showQuestionToAll()">Wyswietl pytanie</button>
</div>

<div id="questionScreen" style="display:none">
  <div class="question-box">
    <div class="category-tag" id="qCategory"></div>
    <div class="question-text" id="qText"></div>
    <div id="qMedia" style="margin-bottom:15px;"></div>
    <div class="answers" id="qAnswers"></div>
  </div>
  <button onclick="endRound()">Zakoncz runde</button>
</div>

<div id="finishedScreen" style="display:none">
  <p style="font-size:1.3em;">Gra zakonczona!</p>
</div>

<button class="end-game-btn" onclick="endGame()">Zakoncz gre</button>
<div class="status" id="status">Laczenie z baza danych...</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="dane.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCI_URtq3UQA5oEvqMaHrAnG9YID5zTTSw",
  authDomain: "postaw-na-milion-30154.firebaseapp.com",
  databaseURL: "https://postaw-na-milion-30154-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "postaw-na-milion-30154",
  storageBucket: "postaw-na-milion-30154.firebasestorage.app",
  messagingSenderId: "892861421426",
  appId: "1:892861421426:web:16e947880cbfad71f92feb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
document.getElementById('status').textContent = 'Polaczono z baza danych';

const MEDIA_CANDIDATES = [
  { ext: 'jpg', type: 'image' },
  { ext: 'jpeg', type: 'image' },
  { ext: 'png', type: 'image' },
  { ext: 'webp', type: 'image' },
  { ext: 'gif', type: 'image' },
  { ext: 'mp4', type: 'video' },
  { ext: 'webm', type: 'video' }
];
const mediaCache = {};

function resolveMedia(baseName) {
  if (mediaCache[baseName]) return Promise.resolve(mediaCache[baseName]);
  let i = 0;
  function tryNext() {
    if (i >= MEDIA_CANDIDATES.length) return Promise.resolve(null);
    const c = MEDIA_CANDIDATES[i];
    i++;
    const url = 'media/' + baseName + '.' + c.ext;
    return fetch(url, { method: 'HEAD' }).then(res => {
      if (res.ok) {
        const result = { url: url, type: c.type };
        mediaCache[baseName] = result;
        return result;
      }
      return tryNext();
    }).catch(function() { return tryNext(); });
  }
  return tryNext();
}

const difficultyNames = { latwe: 'Latwe', srednie: 'Srednie', trudne: 'Trudne', bardzo_trudne: 'Bardzo trudne' };

function getDifficulty(round) {
  if (round <= 5) return 'latwe';
  if (round <= 10) return 'srednie';
  if (round <= 15) return 'trudne';
  if (round <= 20) return 'bardzo_trudne';
  return null;
}

let gameState = null;

db.ref('game').on('value', function(snap) {
  gameState = snap.val();
  if (!gameState) { initGame(); return; }
  render();
});

function initGame() {
  db.ref('game').set({
    round: 1,
    status: 'idle',
    offered: null,
    chosenIndex: null,
    used: { latwe: [], srednie: [], trudne: [], bardzo_trudne: [] }
  });
}

function render() {
  const round = gameState.round;
  const difficulty = getDifficulty(round);
  document.getElementById('roundLabel').textContent = 'Runda ' + round + ' / 20';
  document.getElementById('difficultyLabel').textContent = difficulty ? difficultyNames[difficulty] : '-';

  document.getElementById('idleScreen').style.display = gameState.status === 'idle' ? 'block' : 'none';
  document.getElementById('categoriesScreen').style.display = gameState.status === 'categories' ? 'block' : 'none';
  document.getElementById('questionScreen').style.display = gameState.status === 'question' ? 'block' : 'none';
  document.getElementById('finishedScreen').style.display = gameState.status === 'finished' ? 'block' : 'none';

  if (gameState.status === 'categories') {
    const diffArr = gameData[difficulty];
    const offeredDiv = document.getElementById('offeredCategories');
    offeredDiv.innerHTML = '';
    gameState.offered.forEach(function(idx) {
      const el = document.createElement('div');
      el.className = 'category-chip';
      el.textContent = diffArr[idx].kategoria;
      offeredDiv.appendChild(el);
    });

    if (gameState.chosenIndex !== null && gameState.chosenIndex !== undefined) {
      document.getElementById('waitingForPlayer').textContent = 'Gracz wybral: ' + diffArr[gameState.chosenIndex].kategoria;
      document.getElementById('showQuestionBtn').style.display = 'block';
    } else {
      document.getElementById('waitingForPlayer').textContent = 'Czekam na wybor gracza...';
      document.getElementById('showQuestionBtn').style.display = 'none';
    }
  }

  if (gameState.status === 'question') {
    const q = gameData[difficulty][gameState.chosenIndex];
    document.getElementById('qCategory').textContent = q.kategoria;
    document.getElementById('qText').textContent = q.pytanie;

    const qMediaDiv = document.getElementById('qMedia');
    qMediaDiv.innerHTML = '';
    if (q.media) {
      resolveMedia(q.media).then(function(result) {
        if (!result) return;
        if (result.type === 'video') {
          qMediaDiv.innerHTML = '<video src="' + result.url + '" controls autoplay loop style="max-width:100%; border-radius:8px;"></video>';
        } else {
          qMediaDiv.innerHTML = '<img src="' + result.url + '" style="max-width:100%; border-radius:8px;">';
        }
      });
    }

    const litery = ['A', 'B', 'C', 'D'];
    const answersDiv = document.getElementById('qAnswers');
    answersDiv.innerHTML = '';
    q.odpowiedzi.forEach(function(ans, i) {
      const el = document.createElement('div');
      el.className = 'answer-chip' + (i === q.poprawna ? ' correct' : '');
      el.innerHTML = '<span class="letter">' + litery[i] + '.</span> ' + ans;
      answersDiv.appendChild(el);
    });
  }
}

function startRound() {
  const difficulty = getDifficulty(gameState.round);
  if (!difficulty) return;
  const diffArr = gameData[difficulty];
  const used = (gameState.used && gameState.used[difficulty]) || [];
  const available = diffArr.map(function(_, i) { return i; }).filter(function(i) { return used.indexOf(i) === -1; });

  if (available.length < 2) {
    alert('Za malo kategorii w puli "' + difficulty + '"! Dodaj wiecej w dane.js.');
    return;
  }

  const shuffled = available.sort(function() { return Math.random() - 0.5; });
  const offered = [shuffled[0], shuffled[1]];
  const newUsed = used.concat(offered);

  const updates = {};
  updates['status'] = 'categories';
  updates['offered'] = offered;
  updates['chosenIndex'] = null;
  updates['used/' + difficulty] = newUsed;
  db.ref('game').update(updates);
}

function showQuestionToAll() {
  db.ref('game/status').set('question');
}

function endRound() {
  const nextRound = gameState.round + 1;
  if (nextRound > 20) {
    db.ref('game').update({ status: 'finished' });
  } else {
    db.ref('game').update({
      round: nextRound,
      status: 'idle',
      offered: null,
      chosenIndex: null
    });
  }
}

function endGame() {
  if (!confirm('Na pewno zakonczyc i zresetowac cala gre od runda 1?')) return;
  initGame();
}
</script>
</body>
</html>
